<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>To My Favorite Girl 💐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================================
   CONFIG-DRIVEN SITE — edit content via CONFIG object in JS
   ========================================================= */
:root{
  --pink-50:#fff5fa;
  --pink-100:#ffe4ef;
  --pink-200:#ffc9e0;
  --pink-300:#f8a8cf;
  --pink-400:#f486bd;
  --lav-200:#e6ddff;
  --lav-300:#d3c2f7;
  --purple-400:#b895e8;
  --purple-500:#9a72d6;
  --white:#fffdfe;
  --ink:#5a3d52;
  --ink-soft:#8a6b83;
  --gold:#e9c48a;
  --shadow-soft: 0 20px 60px -20px rgba(154, 114, 214, .35);
  --shadow-card: 0 10px 30px rgba(180,120,170,.18);
  --glass-bg: rgba(255,255,255,.45);
  --glass-border: rgba(255,255,255,.65);
}

*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;height:100%;overflow-x:hidden;
  font-family:'Poppins',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 15% 10%, var(--pink-100), transparent 55%),
    radial-gradient(circle at 85% 15%, var(--lav-200), transparent 55%),
    radial-gradient(circle at 50% 100%, var(--pink-100), transparent 60%),
    linear-gradient(160deg, var(--pink-50), var(--lav-200) 60%, var(--pink-100));
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}

/* subtle noise texture overlay for premium feel */
body::before{
  content:"";
  position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:.035;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

h1,h2,h3,.script{font-family:'Playfair Display', serif;}
.script-hero{font-family:'Great Vibes', cursive;}

button{font-family:'Poppins',sans-serif; cursor:pointer;}

::selection{background:var(--pink-300); color:#fff;}

/* ---------------- Reduced motion respect ---------------- */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
}

/* ---------------- Layout / Page System ---------------- */
#app{position:relative; width:100%; min-height:100vh;}

.page{
  position:fixed; inset:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  opacity:0; visibility:hidden;
  transform:translateX(40px) scale(.98);
  transition:opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1), visibility 0s linear .7s;
  pointer-events:none;
}
.page.active{
  opacity:1; visibility:visible; transform:translateX(0) scale(1);
  transition:opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1);
  pointer-events:auto;
  z-index:5;
}
.page.leaving{
  opacity:0; transform:translateX(-40px) scale(.98);
  z-index:4;
}

/* ---------------- Music Player ---------------- */
.music-toggle{
  position:fixed; top:18px; right:18px; z-index:999;
  width:52px; height:52px; border-radius:50%;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow-card);
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  transition:transform .3s ease, box-shadow .3s ease;
}
.music-toggle:hover{transform:scale(1.08); box-shadow:var(--shadow-soft);}
.music-toggle.playing .bars span{animation-play-state:running;}
.music-toggle .bars{display:flex; gap:2px; align-items:flex-end; height:16px;}
.music-toggle .bars span{
  width:3px; background:var(--purple-500); border-radius:2px;
  animation:eq 1s ease-in-out infinite; animation-play-state:paused;
}
.music-toggle .bars span:nth-child(1){height:6px; animation-delay:.1s;}
.music-toggle .bars span:nth-child(2){height:14px; animation-delay:.3s;}
.music-toggle .bars span:nth-child(3){height:9px; animation-delay:.2s;}
@keyframes eq{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}
.music-toggle.muted .bars span{animation:none; transform:scaleY(.25); opacity:.5;}

/* progress ring nav dots */
.nav-dots{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:999; display:flex; gap:9px;
}
.nav-dots i{
  width:8px; height:8px; border-radius:50%;
  background:rgba(154,114,214,.28);
  transition:all .4s ease;
}
.nav-dots i.on{background:var(--purple-500); width:22px; border-radius:6px;}

/* ---------------- Buttons ---------------- */
.btn{
  position:relative; overflow:hidden;
  border:none; border-radius:999px;
  padding:14px 38px;
  font-size:15px; letter-spacing:.06em; font-weight:500;
  color:#fff;
  background:linear-gradient(135deg, var(--pink-400), var(--purple-500));
  box-shadow:0 12px 28px -10px rgba(154,72,178,.55);
  transition:transform .35s ease, box-shadow .35s ease;
}
.btn:hover{transform:translateY(-3px); box-shadow:0 18px 34px -10px rgba(154,72,178,.65);}
.btn:active{transform:translateY(0px) scale(.97);}
.btn .ripple{
  position:absolute; border-radius:50%; background:rgba(255,255,255,.55);
  transform:scale(0); animation:ripple .6s ease-out forwards; pointer-events:none;
}
@keyframes ripple{to{transform:scale(3); opacity:0;}}

/* ================================================================
   INTRO — LOADING SPINNER (flower spins, then grows to reveal cover)
   ================================================================ */
.intro-loading{
  position:fixed; inset:0; z-index:2100;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  background:linear-gradient(160deg,#efe4ff 0%,#e2d2fb 45%,#d7c2f6 100%);
}
.intro-loading.hide{
  animation:introLoadingOut .4s ease forwards;
  pointer-events:none;
}
@keyframes introLoadingOut{
  0%{opacity:1; transform:scale(1) rotate(0deg);}
  100%{opacity:0; transform:scale(9) rotate(120deg);}
}
.intro-loading-flower{
  width:min(96px,22vw); height:min(96px,22vw);
  border-radius:50%;
  object-fit:cover;
  animation:introSpin 1s linear infinite;
  will-change:transform;
}
@keyframes introSpin{to{transform:rotate(360deg);}}
.intro-loading-text{
  font-family:'Playfair Display',serif; font-style:italic;
  font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);
}

/* ================================================================
   INTRO — FULL-SCREEN FLOWER COVER, THEN FALLS AWAY (plays once)
   Pure CSS transform/opacity animation, no JS animation loop = light.
   ================================================================ */
.intro-cover{
  position:fixed; inset:0; z-index:2000;
  background:linear-gradient(160deg,#efe4ff 0%,#e2d2fb 45%,#d7c2f6 100%);
  overflow:hidden;
  pointer-events:none;
  contain:strict;
}
.intro-cover.zoomout{
  animation:introZoomOut .75s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes introZoomOut{
  0%{opacity:1; transform:scale(1);}
  100%{opacity:0; transform:scale(1.6);}
}
.intro-cover .ipetal{
  position:absolute;
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  transform:scale(.3) rotate(var(--r0,0deg));
  animation:introTileIn .6s cubic-bezier(.22,.61,.36,1) forwards;
  animation-delay:var(--ed,0s);
  will-change:transform, opacity;
  backface-visibility:hidden;
  overflow:hidden;
}
@keyframes introTileIn{
  0%{opacity:0; transform:scale(.3) rotate(var(--r0,0deg));}
  100%{opacity:.98; transform:scale(1) rotate(var(--r0,0deg));}
}
.intro-cover .ipetal img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}
.intro-cover .ipetal.clip img{
  border-radius:50%;
}
.intro-cover .ipetal.blend img{
  mix-blend-mode:screen;
}
.intro-cover.falling .ipetal{
  animation:introFall 1.3s cubic-bezier(.55,.05,.65,.25) forwards;
  animation-delay:var(--fd,0s);
}
@keyframes introFall{
  0%{transform:translate3d(0,0,0) rotate(var(--r0,0deg)); opacity:.98;}
  100%{transform:translate3d(var(--fx,0px),120vh,0) rotate(var(--fr,50deg)); opacity:0;}
}
@media (prefers-reduced-motion: reduce){
  .intro-cover, .intro-loading{display:none;}
}

/* ================================================================
   PAGE 1 — FLOWER HEART
   ================================================================ */
#page-1{background:radial-gradient(ellipse at center, #efe4ff 0%, #e2d2fb 45%, #d7c2f6 100%);}
.p1-floatfield{position:absolute; inset:0; overflow:hidden; z-index:1;}
.floatf{
  position:absolute; font-size:22px; opacity:.55; filter:blur(.2px);
  animation:floatUp linear infinite;
  will-change:transform;
}
.floatf.blur{filter:blur(2px); opacity:.35;}
@keyframes floatUp{
  0%{transform:translateY(10vh) translateX(0) rotate(0deg); opacity:0;}
  10%{opacity:.6;}
  90%{opacity:.5;}
  100%{transform:translateY(-115vh) translateX(30px) rotate(200deg); opacity:0;}
}

.heart-stage{position:relative; width:min(560px,88vw); height:min(560px,88vw); z-index:3;}
.heart-stage svg{position:absolute; inset:0; width:100%; height:100%; overflow:visible;}
.heart-glow{
  position:absolute; inset:-10%;
  background:radial-gradient(circle, rgba(255,214,240,.55), transparent 65%);
  filter:blur(18px); z-index:1; animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.6; transform:scale(1);}50%{opacity:1; transform:scale(1.05);}}

.flower-node{
  position:absolute; top:0; left:0;
  font-size:15px; transform-origin:center;
}

.heart-caption{
  position:relative; z-index:4; text-align:center;
  display:flex; flex-direction:column; gap:6px;
  pointer-events:none;
}
.heart-caption .this-for{
  font-family:'Playfair Display',serif; font-style:italic; font-weight:500;
  font-size:clamp(14px,2vw,18px); letter-spacing:.08em; color:var(--ink);
  opacity:0; animation:capFade 1s ease forwards; animation-delay:.3s;
}
.heart-caption .from-line, .heart-caption .for-line{
  font-family:'Great Vibes',cursive; font-size:clamp(28px,5vw,44px); color:#6b3f7a;
  opacity:0; animation:capFade 1.1s ease forwards;
  text-shadow:0 2px 18px rgba(255,255,255,.8);
}
.heart-caption .from-line{animation-delay:1s;}
.heart-caption .for-line{animation-delay:1.7s;}
@keyframes capFade{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

.p1-btn-wrap{
  position:absolute; bottom:6%; left:50%; transform:translateX(-50%); z-index:6;
  opacity:0; animation:capFade 1s ease forwards; animation-delay:2.6s;
}

.sparkle{
  position:absolute; width:5px; height:5px; border-radius:50%;
  background:#fff; box-shadow:0 0 8px 2px rgba(255,255,255,.9);
  animation:twinkle 2.4s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0; transform:scale(.4);}50%{opacity:1; transform:scale(1);}}

/* ================================================================
   PAGE 2 — CALENDAR
   ================================================================ */
#page-2{
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.9), transparent 40%),
    linear-gradient(160deg, #fbf7f2, #f3ece6 70%);
}
.desk-hearts{position:absolute; inset:0; z-index:0; opacity:.5;}
.desk-hearts span{position:absolute; font-size:20px; color:var(--pink-300); opacity:.5;}

.calendar-wrap{
  perspective:1400px; z-index:3; position:relative;
}
.calendar-card{
  width:min(430px,86vw);
  background:var(--white);
  border-radius:14px;
  box-shadow: 0 35px 60px -18px rgba(120,90,110,.35), 0 4px 12px rgba(120,90,110,.12);
  transform:rotate(9deg) scale(.86);
  transform-origin:center;
  padding:26px 24px 30px;
  position:relative;
  animation:calZoom 2.2s cubic-bezier(.2,.7,.2,1) forwards;
  border:1px solid #f1e6ee;
}
@keyframes calZoom{
  0%{transform:rotate(9deg) scale(.78); }
  60%{transform:rotate(8deg) scale(1.02);}
  100%{transform:rotate(8deg) scale(1);}
}
.calendar-card::before{
  content:""; position:absolute; top:10px; left:24px; right:24px; height:14px;
  background:repeating-linear-gradient(90deg, #e9d3e2 0 8px, transparent 8px 18px);
  border-radius:4px; opacity:.6;
}
.cal-head{display:flex; justify-content:space-between; align-items:baseline; margin:22px 0 14px; font-family:'Playfair Display',serif;}
.cal-head .month{font-size:15px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-cell{
  aspect-ratio:1/0.85; border:1px dashed #eddce6; border-radius:8px;
  font-size:11px; color:#c9a9bd; padding:4px 5px; position:relative;
}
.cal-cell.hero{
  grid-column:span 3; grid-row:span 3;
  aspect-ratio:auto;
  border:1px solid #f0d8e6;
  background:linear-gradient(160deg,#fff,#fff6fb);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:14px 10px; gap:6px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
}
.cal-cell.hero .num{font-size:34px; font-weight:700; color:var(--purple-500); line-height:1;}
.cal-cell.hero .label{font-family:'Playfair Display',serif; font-weight:600; font-size:13px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px;}
.cal-cell.hero .titlescript{font-family:'Great Vibes',cursive; font-size:26px; color:#c25a8f; line-height:1;}
.cal-msg{
  margin-top:16px; font-size:12.5px; line-height:1.7; color:var(--ink-soft);
  font-style:italic; text-align:center; padding:0 6px;
}
.cal-doodles{display:flex; justify-content:center; gap:14px; margin-top:10px; font-size:15px; opacity:.7;}
.cal-doodles span{animation:doodleFloat 3s ease-in-out infinite;}
.cal-doodles span:nth-child(2){animation-delay:.4s;}
.cal-doodles span:nth-child(3){animation-delay:.8s;}
.cal-doodles span:nth-child(4){animation-delay:1.2s;}
@keyframes doodleFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

.p2-btn-wrap{display:flex; justify-content:center; margin-top:22px;}
.calendar-outer{display:flex; flex-direction:column; align-items:center;}

/* ================================================================
   PAGE 3 — HAPPY GIRLFRIEND'S DAY
   ================================================================ */
#page-3{
  background:repeating-linear-gradient(115deg, #fff 0 34px, var(--pink-100) 34px 68px);
}
.p3-container{
  position:relative; z-index:4;
  width:min(900px,92vw);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(16px);
  border-radius:32px;
  box-shadow:var(--shadow-soft);
  padding:clamp(28px,5vw,56px);
  display:flex; align-items:center; justify-content:center; gap:clamp(14px,4vw,46px);
  flex-wrap:wrap;
}
.p3-photo{
  width:clamp(120px,18vw,190px); height:clamp(150px,22vw,235px);
  border-radius:18px; overflow:hidden; position:relative; flex-shrink:0;
  box-shadow:0 18px 34px -10px rgba(120,70,110,.35);
  background:linear-gradient(160deg,#f6dcec,#e7d3f5);
  animation:floatSlow 5s ease-in-out infinite;
  transition:transform .4s ease;
}
.p3-photo img{width:100%; height:100%; object-fit:cover; display:block;}
.p3-photo.left{transform:rotate(-7deg);}
.p3-photo.right{transform:rotate(6deg); animation-delay:.6s;}
.p3-photo:hover{transform:scale(1.06) rotate(0deg); z-index:5;}
@keyframes floatSlow{0%,100%{transform:translateY(0) rotate(var(--r,0deg));}50%{transform:translateY(-10px) rotate(var(--r,0deg));}}
.p3-photo.left{--r:-7deg;}
.p3-photo.right{--r:6deg;}

.p3-textblock{text-align:center; flex:1; min-width:220px;}
.p3-eyebrow{font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
.p3-title{font-family:'Great Vibes',cursive; font-size:clamp(40px,7vw,68px); line-height:1.05; color:#7a3d78;
  text-shadow:0 4px 24px rgba(255,255,255,.7);}
.p3-date{margin-top:10px; font-size:13px; letter-spacing:.12em; color:var(--ink-soft);}

.p3-decor{position:absolute; z-index:2; font-size:22px; opacity:.8; animation:doodleFloat 4s ease-in-out infinite;}
.confetti-bit{
  position:absolute; width:7px; height:10px; opacity:.8; z-index:3;
  animation:confettiFall linear infinite;
}
@keyframes confettiFall{
  0%{transform:translateY(-10vh) rotate(0deg); opacity:0;}
  8%{opacity:.9;}
  100%{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

.p3-btn-wrap{position:absolute; bottom:6%; left:50%; transform:translateX(-50%); z-index:6;}

/* Mobile: photos side by side on top, text below */
@media (max-width:760px){
  .p3-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-areas:
      "photoL photoR"
      "text text";
    gap:14px 10px;
    align-items:start;
  }
  .p3-photo{width:100%; max-width:150px; height:auto; aspect-ratio:4/5; margin:0 auto;}
  .p3-photo.left{grid-area:photoL; justify-self:end;}
  .p3-photo.right{grid-area:photoR; justify-self:start;}
  .p3-textblock{grid-area:text; margin-top:6px;}
}

/* ================================================================
   PAGE 4 — LETTER
   ================================================================ */
#page-4{background:linear-gradient(180deg,#fffefc,#fff5fa 60%);}
.p4-layout{
  width:min(1080px,94vw); display:grid; grid-template-columns:1fr 1.2fr; gap:clamp(24px,5vw,60px);
  align-items:center; z-index:3; position:relative;
}
.p4-photo-wrap{display:flex; justify-content:center;}
.p4-photo{
  width:min(320px,80vw); aspect-ratio:4/5; background:#fff; padding:14px 14px 46px;
  border-radius:6px; box-shadow:0 25px 50px -16px rgba(120,70,110,.4);
  transform:rotate(-5deg); position:relative;
}
.p4-photo img{width:100%; height:100%; object-fit:cover; display:block;}
.p4-photo .cap{
  position:absolute; bottom:10px; left:0; right:0; text-align:center;
  font-family:'Great Vibes',cursive; font-size:20px; color:#a9739e;
}

.p4-content{position:relative;}
.p4-title{font-size:clamp(26px,4vw,38px); font-weight:600; margin-bottom:18px; color:#6b3f6f;}
.p4-letter{
  font-size:clamp(13.5px,1.6vw,15.5px); line-height:1.9; color:var(--ink);
  white-space:pre-wrap; min-height:220px;
  font-family:'Poppins',sans-serif; font-weight:300;
}
.p4-cursor{display:inline-block; width:2px; background:var(--purple-500); margin-left:2px; animation:blink 1s step-start infinite;}
@keyframes blink{50%{opacity:0;}}

.p4-doodle{position:absolute; font-size:20px; opacity:.6; animation:doodleFloat 4s ease-in-out infinite;}
.p4-btn-wrap{margin-top:26px;}

/* ================================================================
   PAGE 5 — GALLERY
   ================================================================ */
#page-5{align-items:flex-start; overflow-y:auto; padding:70px 0 90px;}
.p5-inner{width:min(1100px,94vw); margin:0 auto; position:relative; z-index:3;}
.p5-title{text-align:center; font-size:clamp(28px,4.5vw,42px); font-weight:600; color:#6b3f6f; margin-bottom:8px;}
.p5-sub{text-align:center; font-size:13px; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:34px; text-transform:uppercase;}

.gallery-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:20px;
}
@media (max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr); gap:14px;}}

.g-item{
  border-radius:20px; overflow:hidden; position:relative; cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:transform .45s cubic-bezier(.2,.7,.3,1), box-shadow .45s ease;
  background:#fff;
  opacity:0; transform:translateY(30px);
}
.g-item.reveal{animation:revealUp .7s ease forwards;}
@keyframes revealUp{to{opacity:1; transform:translateY(0);}}
.g-item .imgwrap{aspect-ratio:4/5; overflow:hidden;}
.g-item img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s ease, filter .6s ease;}
.g-item:hover{transform:translateY(-8px) rotate(-1deg); box-shadow:0 26px 46px -14px rgba(150,90,150,.4);}
.g-item:hover img{transform:scale(1.12) rotate(1deg); filter:brightness(1.05) saturate(1.08);}
.g-item .caption{padding:12px 14px 16px; font-size:12.5px; color:var(--ink-soft); font-style:italic; text-align:center; line-height:1.5;}

.p5-decor{position:absolute; font-size:22px; opacity:.6; z-index:1; animation:doodleFloat 4.5s ease-in-out infinite;}

/* Lightbox */
.lightbox{
  position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center;
  background:rgba(70,40,70,.55); backdrop-filter:blur(10px);
  opacity:0; visibility:hidden; transition:opacity .4s ease, visibility 0s linear .4s;
}
.lightbox.show{opacity:1; visibility:visible; transition:opacity .4s ease;}
.lightbox figure{
  max-width:min(720px,90vw); max-height:82vh; margin:0; text-align:center;
  transform:scale(.85); transition:transform .4s cubic-bezier(.2,.7,.3,1);
}
.lightbox.show figure{transform:scale(1);}

/* =========================================================================
   PAGE NAVIGATION
   ========================================================================= */
const pages = Array.from(document.querySelectorAll('.page'));
let currentIndex = 0;

function buildDots(){
  const wrap = document.getElementById('navDots');
  pages.forEach((_,i)=>{
    const d = document.createElement('i');
    if(i===0) d.classList.add('on');
    wrap.appendChild(d);
  });
}
function updateDots(){
  document.querySelectorAll('.nav-dots i').forEach((d,i)=>{
    d.classList.toggle('on', i===currentIndex);
  });
}
function goTo(index){
  if(index === currentIndex || index < 0 || index >= pages.length) return;
  const outgoing = pages[currentIndex];
  const incoming = pages[index];
  outgoing.classList.add('leaving');
  outgoing.classList.remove('active');
  setTimeout(()=>outgoing.classList.remove('leaving'), 700);
  incoming.classList.add('active');
  currentIndex = index;
  updateDots();
  onPageEnter(index);
}
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-next]');
  if(btn){
    createRipple(e, btn);
    goTo(currentIndex+1);
  }
});
function createRipple(e, btn){
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className='ripple';
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size+'px';
  r.style.left = (e.clientX-rect.left-size/2)+'px';
  r.style.top = (e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),650);
}

function onPageEnter(index){
  if(index===1) launchConfetti(14);
  if(index===3) startTypewriter();

}

/* =========================================================================
   MUSIC PLAYER
   ========================================================================= */
const bgm = document.getElementById('bgm');
const musicToggle = document.getElementById('musicToggle');
bgm.src = CONFIG.musicSrc;
bgm.volume = 0.55;
let musicPlaying = false;

function tryAutoplay(){
  if(musicPlaying) return;
  const p = bgm.play();
  if(p !== undefined){
    p.then(()=>{ musicPlaying = true; reflectMusicUI(); })
     .catch(()=>{ musicPlaying = false; reflectMusicUI(); armFirstInteractionPlay(); });
  }
}
function armFirstInteractionPlay(){
  const startOnce = ()=>{
    bgm.play().then(()=>{ musicPlaying = true; reflectMusicUI(); }).catch(()=>{});
    document.removeEventListener('click', startOnce);
    document.removeEventListener('touchstart', startOnce);
  };
  document.addEventListener('click', startOnce, { once:true });
  document.addEventListener('touchstart', startOnce, { once:true });
}
function reflectMusicUI(){
  musicToggle.classList.toggle('playing', musicPlaying);
  musicToggle.classList.toggle('muted', !musicPlaying);
}
musicToggle.addEventListener('click', ()=>{
  if(musicPlaying){ bgm.pause(); musicPlaying=false; }
  else { bgm.play().catch(()=>{}); musicPlaying=true; }
  reflectMusicUI();
});
tryAutoplay();
document.addEventListener('DOMContentLoaded', tryAutoplay);
window.addEventListener('load', tryAutoplay);

/* =========================================================================
   INTRO — FULL-SCREEN FLOWER COVER → FALL AWAY
   Builds a grid of flower glyphs once, then triggers a CSS-only fall.
   No requestAnimationFrame loop is used here, so it stays cheap even
   on lower-end phones.
   ========================================================================= */
/* =========================================================================
   INTRO — LOADING → FLOWERS APPEAR 1,2,4,8... (smooth, staggered) →
   FULL SCREEN → HOLD → FALL AWAY → ZOOM-IN REVEAL → LOVE PAGE
   ========================================================================= */
(function initIntroSequence(){
  const loading = document.getElementById('introLoading');
  const loadingImg = document.getElementById('introLoadingFlower');
  const cover = document.getElementById('introCover');
  if(!loading || !cover) return;

  const photos = CONFIG.flowerPhotos.map(p => ({ src: p.src, cls: p.style }));
  loadingImg.src = photos[0].src;
  // warm the image cache during the loading phase so tiles pop in instantly later
  photos.forEach(p => { const im = new Image(); im.src = p.src; });

  const MIN_LOADING_MS = 1600; // minimum time to show the spinner
  const BATCH_GAP_MS   = 220;  // delay between each doubling batch (1,2,4,8...)
  const ENTER_MS        = 600; // each tile's own fade/scale-in duration
  const HOLD_MS         = 1300;// pause once fully covered
  const FALL_MS         = 1300;// fall animation duration
  const ZOOM_MS         = 750; // zoom-in reveal duration
  const started = performance.now();

  function buildAndRevealTiles(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const tile = Math.max(80, Math.min(170, vw*0.28));
    const area = vw*vh;
    const total = Math.max(24, Math.min(60, Math.ceil((area*2.1)/(tile*tile))));

    // doubling batch sizes: 1, 2, 4, 8, 16... until the screen is covered
    const batches = [];
    let remaining = total, size = 1;
    while(remaining > 0){
      const take = Math.min(size, remaining);
      batches.push(take);
      remaining -= take;
      size *= 2;
    }

    const frag = document.createDocumentFragment();
    batches.forEach((count, batchIdx) => {
      for(let j=0; j<count; j++){
        const pick = photos[Math.floor(Math.random()*photos.length)];
        const s = document.createElement('span');
        s.className = 'ipetal ' + pick.cls;
        const sizePx = tile*(0.7+Math.random()*0.6);
        s.style.width = sizePx+'px';
        s.style.height = sizePx+'px';
        s.style.left = (Math.random()*112-6)+'%';
        s.style.top = (Math.random()*112-6)+'%';
        s.style.zIndex = Math.floor(Math.random()*30);
        s.style.setProperty('--r0', Math.round(Math.random()*40-20)+'deg');
        s.style.setProperty('--ed', (batchIdx*BATCH_GAP_MS/1000).toFixed(2)+'s');
        s.style.setProperty('--fd', (Math.random()*0.45).toFixed(2)+'s');
        s.style.setProperty('--fx', Math.round(Math.random()*60-30)+'px');
        s.style.setProperty('--fr', Math.round(Math.random()*80-20)+'deg');
        const img = document.createElement('img');
        img.src = pick.src;
        img.alt = '';
        img.loading = 'eager';
        img.decoding = 'async';
        s.appendChild(img);
        frag.appendChild(s);
      }
    });
    cover.appendChild(frag);

    return (batches.length-1)*BATCH_GAP_MS + ENTER_MS;
  }

  function runReveal(){
    const waited = performance.now() - started;
    const delay = Math.max(0, MIN_LOADING_MS - waited);
    setTimeout(()=>{
      loading.classList.add('hide');
      setTimeout(()=>{ if(loading.parentNode) loading.remove(); }, 400);

      const entranceMs = buildAndRevealTiles();

      setTimeout(()=>{ cover.classList.add('falling'); }, entranceMs + HOLD_MS);
      setTimeout(()=>{ cover.classList.add('zoomout'); }, entranceMs + HOLD_MS + FALL_MS + 150);
      setTimeout(()=>{ if(cover.parentNode) cover.remove(); }, entranceMs + HOLD_MS + FALL_MS + 150 + ZOOM_MS + 60);
    }, delay);
  }

  if(document.readyState === 'complete') runReveal();
  else window.addEventListener('load', runReveal, { once:true });
})();

/* =========================================================================
   PAGE 1 — FLOWER HEART PATH ANIMATION
   ========================================================================= */
const HEART_PHOTOS = CONFIG.flowerPhotos.map(p => p.src);

function heartPoint(t){
  // classic parametric heart curve
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x, y: -y };
}

function buildHeartFlowers(){
  const svg = document.getElementById('heartSvgLayer');
  const N = 70;
  const nodes = [];
  for(let i=0;i<N;i++){
    const t = (i/N)*Math.PI*2;
    const size = 2.6 + Math.random()*1.6;
    const el = document.createElementNS('http://www.w3.org/2000/svg','image');
    el.setAttributeNS('http://www.w3.org/1999/xlink','href', HEART_PHOTOS[i % HEART_PHOTOS.length]);
    el.setAttribute('href', HEART_PHOTOS[i % HEART_PHOTOS.length]);
    el.setAttribute('width', size.toFixed(2));
    el.setAttribute('height', size.toFixed(2));
    el.style.opacity = 0.92;
    svg.appendChild(el);
    nodes.push({ el, phase: t, size });
  }
  let raf;
  function animate(time){
    const t0 = time*0.00028;
    nodes.forEach((n)=>{
      const t = n.phase + t0;
      const p = heartPoint(t);
      n.el.setAttribute('x', p.x - n.size/2);
      n.el.setAttribute('y', p.y - n.size/2);
      const pulse = 0.85 + 0.15*Math.sin(t*3);
      n.el.setAttribute('opacity', pulse);
    });
    raf = requestAnimationFrame(animate);
  }
  raf = requestAnimationFrame(animate);
}
buildHeartFlowers();

function buildFloatingBackgroundFlowers(){
  const field = document.getElementById('p1Float');
  const glyphs = ['🌸','🌷','💮','✿','❀','🪻'];

    const dur = 10+Math.random()*14;
    s.style.animationDuration = dur+'s';
    s.style.animationDelay = (Math.random()*dur*-1)+'s';
    field.appendChild(s);
  }
  // sparkles
  for(let i=0;i<18;i++){
    const sp = document.createElement('span');
    sp.className='sparkle';
    sp.style.left = Math.random()*100+'%';
    sp.style.top = Math.random()*100+'%';
    sp.style.animationDelay = (Math.random()*2)+'s';
    field.appendChild(sp);
  }
}
buildFloatingBackgroundFlowers();

document.getElementById('fromLine').textContent = 'From ' + CONFIG.fromName;
document.getElementById('forLine').textContent = 'For ' + CONFIG.forName;
// center caption over heart stage
(function centerCaption(){

/* =========================================================================
   PAGE 2 — CALENDAR
   ========================================================================= */
function buildCalendar(){
  document.getElementById('calMonth').textContent = CONFIG.calendarMonth;
  document.getElementById('calMsg').textContent = '"' + CONFIG.calendarMessage + '"';
  const grid = document.getElementById('calGrid');
  // Simple August-style layout, previous month tail (31), hero cell = 1, then 2-8 fill remaining top row spots

  const hero = {num:1, hero:true};
  const rest = [2,3,4,5,6,7,8];
  // Build a 7-col grid: first row: 31, [hero spans 3x3 starting col2]
  // We'll just do: col1 row1 = 31, cols2-4 rows1-3 = hero, col5-7 row1 = blank-ish small filler, row2 col1 =7 etc simplified.

  grid.appendChild(heroCell);

  const c8 = document.createElement('div'); c8.className='cal-cell'; c8.style.gridColumn='5'; c8.textContent='8'; grid.appendChild(c8);
  const c7 = document.createElement('div'); c7.className='cal-cell'; c7.style.gridColumn='1'; c7.style.gridRow='4'; c7.textContent='7'; grid.appendChild(c7);

  grid.style.gridTemplateRows = 'repeat(4, minmax(30px, auto))';
}
buildCalendar();

  const wrap = document.getElementById('deskHearts');

/* =========================================================================
   PAGE 3 — DECOR + CONFETTI + DATE
   ========================================================================= */

function buildP3Decor(){

function launchConfetti(count){

setInterval(()=>{ if(currentIndex===2 || currentIndex===4) launchConfetti(4); }, 2600);

/* =========================================================================
   PAGE 4 — TYPEWRITER LETTER
   ========================================================================= */
let typewriterStarted = false;
function startTypewriter(){
  if(typewriterStarted) return;
  typewriterStarted = true;
  const el = document.getElementById('letterText');
  const cursor = document.createElement('span');
  cursor.className='p4-cursor';
  const text = CONFIG.letterText;
  // split into tokens, keeping newlines as their own token
  const tokens = text.split(/(\n)/).flatMap(chunk =>
    chunk === '\n' ? ['\n'] : chunk.split(' ').map((w,i,arr)=> i < arr.length-1 ? w+' ' : w)
  ).filter(t => t.length > 0);
  let i = 0;
  el.textContent='';
  el.appendChild(cursor);
  function tick(){
    if(i < tokens.length){
      const tok = tokens[i];
      cursor.insertAdjacentText('beforebegin', tok);
      i++;
      let delay = 55 + Math.random()*35;
      if(tok === '\n') delay += 120;
      setTimeout(tick, delay);
    } else {
      setTimeout(()=>{
        cursor.remove();
        document.getElementById('letterNextBtn').style.opacity = '1';
        document.getElementById('letterNextBtn').style.pointerEvents='auto';
      }, 700);
    }
  }
  setTimeout(tick, 400);
}

   PAGE 5 — GALLERY + LIGHTBOX
   ========================================================================= */

}

function buildP5Decor(){

  const glyphs = ['🦋','☁️','⭐','✨','🌷','🎀'];
  const positions = [['4%','8%'],['92%','10%'],['3%','60%'],['93%','65%'],['50%','4%']];
  positions.forEach((pos,i)=>{
    const s = document.createElement('span');
    s.className='p5-decor';
    s.textContent = glyphs[i%glyphs.length];
    s.style.left=pos[0]; s.style.top=pos[1];
    s.style.animationDelay=(i*0.35)+'s';
    wrap.appendChild(s);
  });
}
buildP5Decor();

let galleryRevealed = false;
function revealGallery(){
  if(galleryRevealed) return;
  galleryRevealed = true;
  document.querySelectorAll('.g-item').forEach((el,i)=>{
    setTimeout(()=>el.classList.add('reveal'), i*110);
  });
}

/* Lightbox logic */
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCap = document.getElementById('lbCap');
let lbIndex = 0;
function openLightbox(i){
  lbIndex = i;
  updateLightbox();
  lightbox.classList.add('show');
}
function updateLightbox(){
  const item = CONFIG.gallery[lbIndex];
  lbImg.src = item.src;
  lbCap.textContent = item.caption;
}
document.getElementById('galleryGrid').addEventListener('click', (e)=>{
  const cell = e.target.closest('.g-item');
  if(cell) openLightbox(parseInt(cell.dataset.index,10));
});
document.getElementById('lbClose').addEventListener('click', ()=>lightbox.classList.remove('show'));
lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) lightbox.classList.remove('show'); });
document.getElementById('lbPrev').addEventListener('click', ()=>{
  lbIndex = (lbIndex - 1 + CONFIG.gallery.length) % CONFIG.gallery.length;
  updateLightbox();
});
document.getElementById('lbNext').addEventListener('click', ()=>{
  lbIndex = (lbIndex + 1) % CONFIG.gallery.length;
  updateLightbox();
});
document.addEventListener('keydown', (e)=>{
  if(!lightbox.classList.contains('show')) return;
  if(e.key==='Escape') lightbox.classList.remove('show');
  if(e.key==='ArrowLeft') document.getElementById('lbPrev').click();
  if(e.key==='ArrowRight') document.getElementById('lbNext').click();
});

/* =========================================================================
   INIT
   ========================================================================= */
buildDots();
updateDots();
</script>
